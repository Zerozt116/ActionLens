dataset_name: charades
train_split: ['train']
val_split: ['train']
dataset: {
  json_file: ./data/charades/tal_annotations.json,
  clips_manifest: ./outputs/charades_clips_500.csv,
  feature_manifest: ./data/charades/features_manifest_500.json,
  split_folder: ./data/charades/splits_500,
  feat_folder: ./data/charades/features_500,
  file_prefix: ~,
  file_ext: .npz,
  num_classes: 24,
  input_dim: 2304,
  feat_stride: 15,
  num_frames: 32,
  default_fps: 30,
  downsample_rate: 1,
  trunc_thresh: 0.5,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 256,
}
model: {
  backbone_arch: [2, 2, 5],
  regression_range: [[0, 4], [4, 8], [8, 16], [16, 32], [32, 64], [64, 10000]],
  fpn_type: identity,
  max_buffer_len_factor: 4.0,
  n_mha_win_size: 8,
  embd_dim: 256,
  fpn_dim: 256,
  head_dim: 256,
  n_head: 4,
}
loader: {
  batch_size: 4,
  num_workers: 4,
}
train_cfg: {
  init_loss_norm: 250,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
  label_smoothing: 0.1,
}
test_cfg: {
  pre_nms_thresh: 0.001,
  pre_nms_topk: 1000,
  max_seg_num: 200,
  min_score: 0.001,
  nms_method: soft,
  nms_sigma: 0.5,
  multiclass_nms: True,
}
opt: {
  learning_rate: 0.0001,
  epochs: 60,
  weight_decay: 0.05,
}
output_folder: ./external/actionformer_release/ckpt/
